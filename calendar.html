<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 24px;
  }

  /* ── Nav ── */
  .nav {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 20px;
  }

  .nav button {
    background: none;
    border: 1px solid #333;
    color: #aaa;
    width: 34px; height: 34px;
    border-radius: 6px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .nav button:hover { background: #1e1e28; color: #fff; }

  .month-label {
    font-size: 1.4rem;
    font-weight: 600;
    min-width: 200px;
    text-align: center;
  }

  /* ── Calendar grid ── */
  .calendar {
    width: 100%;
    max-width: 780px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .dow {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    padding-bottom: 6px;
  }

  .day {
    background: #16161e;
    border: 1px solid #222;
    border-radius: 8px;
    min-height: 96px;
    padding: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .day:hover { border-color: #444; background: #1a1a24; }
  .day.empty { background: transparent; border-color: transparent; cursor: default; }
  .day.today { border-color: #5b6af0; }
  .day.today .day-num { color: #5b6af0; font-weight: 700; }

  .day-num {
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 4px;
  }

  .task-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .task-chip {
    font-size: 0.7rem;
    background: #1e2240;
    border-left: 2px solid #5b6af0;
    color: #b0b8ff;
    padding: 2px 5px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .task-chip.done {
    background: #1a2420;
    border-color: #3a8a5a;
    color: #6aaf8a;
    text-decoration: line-through;
    opacity: 0.7;
  }
  .task-chip .del {
    margin-left: auto;
    opacity: 0;
    cursor: pointer;
    flex-shrink: 0;
    color: #f06060;
    font-size: 0.75rem;
  }
  .task-chip:hover .del { opacity: 1; }

  .overflow-hint {
    font-size: 0.65rem;
    color: #555;
    margin-top: 2px;
  }

  /* ── Modal ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 10;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  .modal {
    background: #1a1a24;
    border: 1px solid #333;
    border-radius: 12px;
    width: 360px;
    max-width: 94vw;
    padding: 24px;
  }

  .modal h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: #ccc;
  }

  .modal-tasks {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 240px;
    overflow-y: auto;
    margin-bottom: 16px;
  }

  .modal-task {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #111118;
    border: 1px solid #2a2a38;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.85rem;
  }
  .modal-task input[type="checkbox"] {
    accent-color: #5b6af0;
    width: 15px; height: 15px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .modal-task span {
    flex: 1;
    word-break: break-word;
  }
  .modal-task span.done { text-decoration: line-through; color: #555; }
  .modal-task .del-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .modal-task .del-btn:hover { color: #f06060; }

  .modal-empty { color: #444; font-size: 0.8rem; }

  .add-row {
    display: flex;
    gap: 8px;
  }

  .add-row input[type="text"] {
    flex: 1;
    background: #111118;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 0.9rem;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-row input[type="text"]:focus { border-color: #5b6af0; }

  .add-row button, .close-btn {
    background: #5b6af0;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .add-row button:hover { background: #6e7ef5; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 14px;
  }
  .close-btn { background: #2a2a38; }
  .close-btn:hover { background: #33334a; }
</style>
</head>
<body>

<h1>Calendar</h1>

<div class="nav">
  <button id="prevBtn">&#8249;</button>
  <div class="month-label" id="monthLabel"></div>
  <button id="nextBtn">&#8250;</button>
</div>

<div class="calendar" id="calendar"></div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div class="modal-tasks" id="modalTasks"></div>
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="New task…" maxlength="120">
      <button id="addBtn">Add</button>
    </div>
    <div class="modal-footer">
      <button class="close-btn" id="closeBtn">Done</button>
    </div>
  </div>
</div>

<script>
  const DAYS_OF_WEEK = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  // tasks[YYYY-MM-DD] = [{id, text, done}]
  let tasks = JSON.parse(localStorage.getItem('cal_tasks') || '{}');
  let cur = { year: new Date().getFullYear(), month: new Date().getMonth() };
  let activeDate = null;

  function save() {
    localStorage.setItem('cal_tasks', JSON.stringify(tasks));
  }

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function renderCalendar() {
    const { year, month } = cur;
    document.getElementById('monthLabel').textContent = `${MONTHS[month]} ${year}`;

    const cal = document.getElementById('calendar');
    cal.innerHTML = '';

    // Day-of-week headers
    DAYS_OF_WEEK.forEach(d => {
      const el = document.createElement('div');
      el.className = 'dow';
      el.textContent = d;
      cal.appendChild(el);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'day empty';
      cal.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const key = dateKey(year, month, d);
      const dayTasks = tasks[key] || [];
      const isToday = today.getFullYear() === year &&
                      today.getMonth() === month &&
                      today.getDate() === d;

      const el = document.createElement('div');
      el.className = 'day' + (isToday ? ' today' : '');

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = d;
      el.appendChild(num);

      const list = document.createElement('div');
      list.className = 'task-list';

      const MAX_SHOW = 3;
      dayTasks.slice(0, MAX_SHOW).forEach(t => {
        const chip = document.createElement('div');
        chip.className = 'task-chip' + (t.done ? ' done' : '');
        chip.title = t.text;

        const label = document.createElement('span');
        label.textContent = t.text;
        chip.appendChild(label);

        const del = document.createElement('span');
        del.className = 'del';
        del.textContent = '✕';
        del.addEventListener('click', e => {
          e.stopPropagation();
          tasks[key] = tasks[key].filter(x => x.id !== t.id);
          if (!tasks[key].length) delete tasks[key];
          save();
          renderCalendar();
        });
        chip.appendChild(del);
        list.appendChild(chip);
      });

      if (dayTasks.length > MAX_SHOW) {
        const more = document.createElement('div');
        more.className = 'overflow-hint';
        more.textContent = `+${dayTasks.length - MAX_SHOW} more`;
        list.appendChild(more);
      }

      el.appendChild(list);
      el.addEventListener('click', () => openModal(year, month, d));
      cal.appendChild(el);
    }
  }

  /* ── Modal ── */
  function openModal(year, month, day) {
    activeDate = dateKey(year, month, day);
    document.getElementById('modalTitle').textContent =
      `${MONTHS[month]} ${day}, ${year}`;
    renderModalTasks();
    document.getElementById('overlay').classList.add('open');
    document.getElementById('taskInput').focus();
  }

  function renderModalTasks() {
    const container = document.getElementById('modalTasks');
    container.innerHTML = '';
    const list = tasks[activeDate] || [];

    if (!list.length) {
      const empty = document.createElement('div');
      empty.className = 'modal-empty';
      empty.textContent = 'No tasks yet.';
      container.appendChild(empty);
      return;
    }

    list.forEach(t => {
      const row = document.createElement('div');
      row.className = 'modal-task';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = t.done;
      cb.addEventListener('change', () => {
        t.done = cb.checked;
        save();
        renderModalTasks();
        renderCalendar();
      });

      const span = document.createElement('span');
      span.textContent = t.text;
      if (t.done) span.classList.add('done');

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '×';
      del.addEventListener('click', () => {
        tasks[activeDate] = tasks[activeDate].filter(x => x.id !== t.id);
        if (!tasks[activeDate].length) delete tasks[activeDate];
        save();
        renderModalTasks();
        renderCalendar();
      });

      row.append(cb, span, del);
      container.appendChild(row);
    });
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    if (!tasks[activeDate]) tasks[activeDate] = [];
    tasks[activeDate].push({ id: Date.now(), text, done: false });
    save();
    input.value = '';
    renderModalTasks();
    renderCalendar();
    input.focus();
  }

  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });
  document.getElementById('closeBtn').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('open');
  });
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) {
      document.getElementById('overlay').classList.remove('open');
    }
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    cur.month--;
    if (cur.month < 0) { cur.month = 11; cur.year--; }
    renderCalendar();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    cur.month++;
    if (cur.month > 11) { cur.month = 0; cur.year++; }
    renderCalendar();
  });

  renderCalendar();
</script>
</body>
</html>
